<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tab Saver</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <section class="hero">
        <p class="eyebrow">Chrome Extension</p>
        <h1>Tab 收藏库</h1>
        <p class="subtitle">永久保存标签页，按 Collection 分类管理，一键重新打开。</p>
      </section>

      <section class="actions">
        <div class="toolbar">
          <button id="export-button" class="ghost">导出数据</button>
          <button id="import-button" class="ghost">导入数据</button>
          <input id="import-file" type="file" accept="application/json" hidden />
        </div>

        <button id="quick-save-button" class="primary">一键保存当前全部 Tab</button>

        <label class="field">
          <span>Collection 名称</span>
          <input id="collection-name" type="text" placeholder="例如：工作 / 学习 / 购物" />
        </label>
        <button id="save-button" class="secondary">按名称保存到 Collection</button>
        <p id="status-message" class="status-message" hidden></p>
      </section>

      <section class="collections">
        <div class="section-header">
          <h2>我的 Collections</h2>
          <span id="collection-count" class="count">0</span>
        </div>
        <div id="empty-state" class="empty-state">还没有收藏，先保存当前窗口试试看。</div>
        <ul id="collection-list" class="collection-list"></ul>
      </section>
    </main>

    <template id="collection-item-template">
      <li class="collection-item">
        <div class="collection-top">
          <div class="collection-meta">
            <div class="collection-title-row">
              <p class="collection-name"></p>
              <span class="pin-badge" hidden>置顶</span>
            </div>
            <p class="collection-detail"></p>
          </div>
          <div class="button-row">
            <button class="ghost" data-role="open">打开</button>
            <button class="ghost" data-role="pin">置顶</button>
            <button class="ghost danger" data-role="delete">删除</button>
          </div>
        </div>
        <ol class="tab-preview"></ol>
      </li>
    </template>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
